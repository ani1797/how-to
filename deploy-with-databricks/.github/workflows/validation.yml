name: Validation
on:
  pull_request:
    branches:
      - develop
      - main
jobs:
  python_build:
    name: 'Build the Python package'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      # Install pre-requisites
      - uses: databricks/setup-cli@main
      - uses: astral-sh/setup-uv@v5
      - name: "Set up Python with specified version"
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      # Python package builds
      - name: "Set up Python with specified version"
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: "Build the package"
        run: uv build
      # TODO: Synk Scan
      # TODO: SonarQube Scan

  test:
    name: 'Run the tests'
    runs-on: ubuntu-latest
    needs: [python_build]
    steps:
      - uses: actions/checkout@v3
      # Install pre-requisites
      - uses: databricks/setup-cli@main
      - uses: astral-sh/setup-uv@v5
      # Python package builds
      - name: "Set up Python with specified version"
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: "Run the tests"
        run: uv run pytest

  validate_databricks_workflow:
    name: 'Validate Databricks Workflow'
    runs-on: ubuntu-latest
    needs: [python_build]
    strategy:
      fail-fast: true
      matrix:
        target: [dev, staging, prod]
    steps:
      - uses: actions/checkout@v3
      # Install pre-requisites
      - uses: databricks/setup-cli@main
      - name: Azure Login
        uses: Azure/login@v2.3.0
        env:
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          allow-no-subscriptions: true
      - run: databricks auth describe
      - run: databricks bundle validate --target ${{ matrix.target }}
        working-directory: .
